services:
  - type: web
    name: cubers-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: cd apps/api && npx tsx src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: DEV_AUTH_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
